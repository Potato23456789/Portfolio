  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme)
    localStorage.setItem('theme', theme)
    updateThemeBtns()
  }

  function toggleSidebar() {
    const layout  = document.querySelector('.layout')
    const sidebar = document.querySelector('.sidebar')
    const collapsed = sidebar.classList.toggle('collapsed')
    layout.classList.toggle('sidebar-collapsed', collapsed)
    localStorage.setItem('sidebar', collapsed ? 'collapsed' : 'open')
  }

  // Restore sidebar state on load
  if (localStorage.getItem('sidebar') === 'collapsed') {
    document.querySelector('.sidebar')?.classList.add('collapsed')
    document.querySelector('.layout')?.classList.add('sidebar-collapsed')
  }

  function updateThemeBtns() {
    const current = document.documentElement.getAttribute('data-theme')
    document.querySelectorAll('.btn-pill[id^="btn-"]').forEach(btn => {
      if (btn.id === 'btn-lang') return
      btn.classList.toggle('active-theme', btn.id === 'btn-' + current)
    })
  }

  function toggleLang() {
    const lang = localStorage.getItem('lang') === 'vi' ? 'en' : 'vi'
    localStorage.setItem('lang', lang)
    document.documentElement.setAttribute('data-lang', lang)
    document.getElementById('btn-lang').textContent = lang === 'vi' ? 'EN' : 'VI'
    applyLang(lang)
  }

  function applyLang(lang) {
    document.querySelectorAll('[data-en]').forEach(el => {
      el.textContent = lang === 'vi' ? el.dataset.vi : el.dataset.en
    })
  }

  // Apply saved state on load
  const savedTheme = localStorage.getItem('theme') || 'dark'
  const savedLang  = localStorage.getItem('lang')  || 'en'
  setTheme(savedTheme)
  document.documentElement.setAttribute('data-lang', savedLang)
  document.getElementById('btn-lang').textContent = savedLang === 'vi' ? 'EN' : 'VI'
  applyLang(savedLang)
